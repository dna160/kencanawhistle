version: "3.9"

# Local development stack: app + Postgres + optional object-storage (MinIO)
# Usage:
#   docker compose up --build
#   docker compose exec app npm run db:seed

services:
  app:
    build:
      context: .
      target: build          # use build stage in dev for hot reload
    command: sh -c "npx prisma migrate dev --skip-seed && npm run dev"
    env_file: .env.local
    environment:
      DATABASE_URL: "postgresql://whistleblow:whistleblow@db:5432/whistleblow?schema=public"
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whistleblow
      POSTGRES_PASSWORD: whistleblow
      POSTGRES_DB: whistleblow
    ports:
      - "5432:5432"          # expose locally for db:studio
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whistleblow -d whistleblow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Optional: MinIO for local S3-compatible object storage (attachments)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    profiles:
      - storage   # only started with: docker compose --profile storage up

volumes:
  pg_data:
  minio_data:
